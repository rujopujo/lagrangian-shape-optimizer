# Dark theme defaults for the shape optimizer Streamlit app (matches app.py CSS).
[browser]
gatherUsageStats = false

[server]
headless = true
port = 8501
address = "127.0.0.1"

[client]
showSidebarNavigation = false

[theme]
base = "dark"
primaryColor = "#0a84ff"
backgroundColor = "#000000"
secondaryBackgroundColor = "#1c1c1e"
textColor = "#f5f5f7"
font = "sans serif"
